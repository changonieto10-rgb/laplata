<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — La Vizcachera La Plata</title>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Lato',sans-serif; background:#0D0D0D; color:white; min-height:100vh; padding:20px; }
  .header {
    text-align:center; padding:20px 0 30px;
    border-bottom:2px solid #A0221E; margin-bottom:24px;
  }
  .header h1 { font-size:20px; color:white; }
  .header p { color:#A0221E; font-size:11px; letter-spacing:3px; text-transform:uppercase; margin-top:6px; }
  
  .login-box {
    max-width:340px; margin:60px auto;
    background:#1A1A1A; border-radius:12px; padding:28px;
    border:1px solid #222;
  }
  .login-box h2 { font-size:16px; margin-bottom:20px; text-align:center; }
  .login-box input {
    width:100%; padding:13px 15px; margin-bottom:14px;
    border:1.5px solid #333; border-radius:8px;
    background:#111; color:white; font-size:16px;
    font-family:'Lato',sans-serif; outline:none;
  }
  .login-box input:focus { border-color:#A0221E; }
  .btn-login {
    width:100%; padding:14px; background:#A0221E;
    color:white; border:none; border-radius:8px;
    font-size:15px; font-weight:700; cursor:pointer;
    font-family:'Lato',sans-serif; text-transform:uppercase; letter-spacing:1px;
  }
  .btn-login:hover { background:#6B1614; }
  .error-msg { color:#ff6b6b; font-size:12px; text-align:center; margin-top:8px; }

  .admin-panel { max-width:500px; margin:0 auto; display:none; }
  .seccion-titulo {
    font-size:11px; font-weight:700; color:#A0221E;
    letter-spacing:3px; text-transform:uppercase;
    margin:20px 0 10px; padding-bottom:8px;
    border-bottom:1px solid #222;
  }
  .producto-item {
    background:#1A1A1A; border-radius:10px; padding:14px 16px;
    margin-bottom:8px; display:flex; align-items:center;
    justify-content:space-between; border:1px solid #222;
  }
  .prod-nombre { font-size:14px; font-weight:700; }
  .prod-nombre.sin-stock { color:#666; }
  
  .toggle {
    position:relative; width:52px; height:28px;
    cursor:pointer; flex-shrink:0;
  }
  .toggle input { opacity:0; width:0; height:0; }
  .slider {
    position:absolute; inset:0;
    background:#333; border-radius:28px;
    transition:0.3s;
  }
  .slider:before {
    content:""; position:absolute;
    width:22px; height:22px; left:3px; bottom:3px;
    background:white; border-radius:50%; transition:0.3s;
  }
  input:checked + .slider { background:#2E7D32; }
  input:checked + .slider:before { transform:translateX(24px); }
  
  .estado-badge {
    font-size:10px; font-weight:700; padding:2px 8px;
    border-radius:20px; letter-spacing:1px; text-transform:uppercase;
    margin-left:10px;
  }
  .badge-ok { background:#1B5E20; color:#C8E6C9; }
  .badge-no { background:#5C0E0E; color:#FFCDD2; }
  
  .btn-logout {
    display:block; width:100%; padding:12px; margin-top:30px;
    background:#222; color:#888; border:1px solid #333;
    border-radius:8px; font-size:13px; cursor:pointer;
    font-family:'Lato',sans-serif; text-align:center;
  }
  .guardando {
    position:fixed; top:16px; right:16px;
    background:#2E7D32; color:white; padding:8px 16px;
    border-radius:20px; font-size:12px; font-weight:700;
    opacity:0; transition:opacity 0.3s;
  }
  .guardando.show { opacity:1; }
</style>
</head>
<body>

<div class="guardando" id="guardando">✅ Guardado</div>

<div class="header">
  <h1>La Vizcachera del Chango Nieto</h1>
  <p>Panel de administración · La Plata</p>
</div>

<div class="login-box" id="login-box">
  <h2>🔐 Ingresá tu clave</h2>
  <input type="password" id="clave-input" placeholder="Clave de administrador" onkeypress="if(event.key==='Enter')login()">
  <button class="btn-login" onclick="login()">Entrar</button>
  <div class="error-msg" id="error-msg"></div>
</div>

<div class="admin-panel" id="admin-panel">

  <div class="seccion-titulo">Empanadas</div>
  <div id="lista-empanadas"></div>
  
  <div class="seccion-titulo">Platos</div>
  <div id="lista-platos"></div>
  
  <div class="seccion-titulo">Salsas</div>
  <div id="lista-salsas"></div>
  
  <div class="seccion-titulo">Pastelitos</div>
  <div id="lista-pastelitos"></div>
  
  <div class="seccion-titulo">Bebidas</div>
  <div id="lista-bebidas"></div>

  <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBVR-i_roFwBUEzBSLCoSZ1rqOFlKo7IOQ",
  authDomain: "vizcachera-3c567.firebaseapp.com",
  databaseURL: "https://vizcachera-3c567-default-rtdb.firebaseio.com",
  projectId: "vizcachera-3c567",
  storageBucket: "vizcachera-3c567.firebasestorage.app",
  messagingSenderId: "292776466925",
  appId: "1:292776466925:web:74f67fc97abd1280946fe4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const CLAVE = "chango1970";

const GRUPOS = {
  empanadas: [
    {id:'carne_tuc', nombre:'Carne tucumana'},
    {id:'carne_salt', nombre:'Carne salteña'},
    {id:'pollo', nombre:'Pollo'},
    {id:'jamon_queso', nombre:'Jamón y queso'},
    {id:'verdura', nombre:'Verdura'},
    {id:'queso_norteno', nombre:'Queso norteño'},
    {id:'cebolla_queso', nombre:'Cebolla y queso'},
    {id:'humita', nombre:'Humita'},
  ],
  platos: [
    {id:'locro', nombre:'Locro'},
  ],
  salsas: [
    {id:'yasgua', nombre:'Yasgua'},
    {id:'salsa_locro', nombre:'Salsa de locro'},
  ],
  pastelitos: [
    {id:'past_batata', nombre:'Pastelito de batata'},
    {id:'past_membrillo', nombre:'Pastelito de membrillo'},
  ],
  bebidas: [
    {id:'coca', nombre:'Coca-Cola'},
    {id:'sprite', nombre:'Sprite'},
    {id:'coca_zero', nombre:'Coca Zero'},
    {id:'agua', nombre:'Agua mineral'},
  ],
};

let stockActual = {};

function login() {
  const clave = document.getElementById('clave-input').value;
  if(clave === CLAVE) {
    document.getElementById('login-box').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    cargarPanel();
  } else {
    document.getElementById('error-msg').textContent = 'Clave incorrecta';
  }
}

function logout() {
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('login-box').style.display = 'block';
  document.getElementById('clave-input').value = '';
}

function cargarPanel() {
  db.ref('stock_laplata').on('value', snap => {
    stockActual = snap.val() || {};
    
    Object.entries(GRUPOS).forEach(([grupo, productos]) => {
      const contenedor = document.getElementById('lista-' + grupo);
      contenedor.innerHTML = '';
      productos.forEach(p => {
        const disponible = stockActual[p.id] !== false;
        contenedor.innerHTML += `
          <div class="producto-item" id="item-${p.id}">
            <span class="prod-nombre ${disponible?'':'sin-stock'}" id="nombre-${p.id}">${p.nombre}</span>
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="estado-badge ${disponible?'badge-ok':'badge-no'}" id="badge-${p.id}">${disponible?'Disponible':'Sin stock'}</span>
              <label class="toggle">
                <input type="checkbox" ${disponible?'checked':''} onchange="toggleStock('${p.id}', this.checked)">
                <span class="slider"></span>
              </label>
            </div>
          </div>
        `;
      });
    });
  });
}

function toggleStock(id, disponible) {
  db.ref('stock_laplata/' + id).set(disponible).then(() => {
    const g = document.getElementById('guardando');
    g.classList.add('show');
    setTimeout(() => g.classList.remove('show'), 1500);
  });
}
</script>
</body>
</html>
